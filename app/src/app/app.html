<mat-drawer-container class="menu-container">
  <mat-drawer #drawer mode="side" class="sideMenu-container">
    <app-side-bar></app-side-bar>
  </mat-drawer>

  <div class="flex-space background-img">
    <div class="sidenav-content">
      <button type="button" matIconButton (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <!-- Contenido de la app (Header, body y footer)-->
    <div class="ToolBar-container">
      <app-header></app-header>
      <div class="body-container">
        <router-outlet />
      </div>
    </div>
  </div>
</mat-drawer-container>
