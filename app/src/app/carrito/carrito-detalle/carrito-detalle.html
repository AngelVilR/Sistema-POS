<h2 mat-dialog-title style="font-weight: 500;">Resumen de la venta</h2>
<mat-dialog-content class="mat-typography">
  <div>
    <!-- Linea de productos -->
    <div>
      <div class="flex-space">
        <div>
          <h3>PRODUCTO_NOMBRE</h3>
          <p>CANTIDAD x <b style="color: #e4bb27;">&#8353;PRECIO</b></p>
        </div>

        <div>
          <mat-icon>delete</mat-icon>
        </div>
      </div>
      <mat-divider></mat-divider>

      <div class="flex-space">
        <div>
          <h3>PRODUCTO_NOMBRE</h3>
          <p>CANTIDAD x <b style="color: #e4bb27;">&#8353;PRECIO</b></p>
        </div>

        <div>
          <mat-icon>delete</mat-icon>
        </div>
      </div>
      <mat-divider></mat-divider>
    </div>
  </div>

  <div>
    <div class="divTable style-tabla-costos">
      <div class="divTableBody">
        <div class="divTableRow">
          <div class="divTableCell">
            <h3>Descuento aplicado</h3>
          </div>
          <div class="divTableCell">TIPO_DESCUENTO</div>
        </div>
        <div class="divTableRow">
          <div class="divTableCell">
            <h3>Subtotal</h3>
          </div>
          <div class="divTableCell">&#8353;SUBTOTAL</div>
        </div>
        <div class="divTableRow">
          <div class="divTableCell">
            <h3>IVA</h3>
          </div>
          <div class="divTableCell">&#8353;IVA</div>
        </div>
        <div class="divTableRow">
          <div class="divTableCell">
            <h3>Total</h3>
          </div>
          <div class="divTableCell">&#8353;TOTAL</div>
        </div>
      </div>
    </div>
  </div>


</mat-dialog-content>
<mat-dialog-actions>
  <button matButton class="style-Btn" style="background-color: #ffdc5c;" [mat-dialog-close]="true" [routerLink]="['/procesar-pago']">Procesar pago</button>
</mat-dialog-actions>
