<div class="mat-elevation-z8" style="margin: 2em 0em">
  <div style="display: flex; justify-content: center">
    <h1>Mantenimiento de usuarios</h1>
  </div>

  <div style="display: flex; justify-content: center">
    <button class="addProduct-button" (click)="crearUsuario()">
      <mat-icon class="mat-18">add_circle</mat-icon>
    </button>
  </div>
  @if (datos && datos.length > 0) {
  <table class="Estilo-Tabla" mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="CELDA_1">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let row"> {{ row.nombre }} </td>
    </ng-container>

    <ng-container matColumnDef="CELDA_2">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row"> {{ row.email }} </td>
    </ng-container>

    <ng-container matColumnDef="CELDA_3">
      <th mat-header-cell *matHeaderCellDef>Rol</th>
      <td mat-cell *matCellDef="let row"> {{ row.role }} </td>
    </ng-container>

    <ng-container matColumnDef="CELDA_4">
      <th mat-header-cell *matHeaderCellDef>Telefono</th>
      <td mat-cell *matCellDef="let row"> {{ row.telefono }} </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td class="Estilo-Btn" mat-cell *matCellDef="let row">
        <div>
          <button (click)="actualizarUsuario(row.id)" type="button" class="Estilo-BtnEditar" style="color: #b624da; border-color: #b624da" matButton="filled">
            <mat-icon class="mat-18"> edit</mat-icon>
            <p>Editar</p>
          </button>

          <!-- @if (row.estado == 1) {
          <button type="button" class="Estilo-BtnDesactivar" style="color: #656565; border-color: #656565" matButton="filled"
          (click)="desactivarProducto(row)"
          >
            <mat-icon class="mat-18"> block</mat-icon>
            <p>{{'producto.admin.desactivarProducto' | transloco}}</p>
          </button>
          }@else{
          <button type="button" class="Estilo-BtnDesactivar" style="color: #656565; border-color: #656565" matButton="filled"
          (click)="activarProducto(row)"
          >
            <mat-icon class="mat-18"> visibility</mat-icon>
            <p>{{'producto.admin.activarProducto' | transloco}}</p>
          </button>
          } -->
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

}
  <mat-paginator #paginator [pageIndex]="0" [pageSize]="5"
    [pageSizeOptions]="[3, 5, 10]">
  </mat-paginator>
</div>
