<div class="container">
    <!-- EncabezadoFactura -->
    <div class="container-Encabezado">
        <div class="flex-space">
            <h1>Factura #ID_FACTURA</h1>
            <div class="div-image"></div>
        </div>

        <div>
            <table class="style-EncFacturaInfo">
                <tbody>
                    <tr>
                        <td>Fecha de creación:</td>
                        <td>FECHA_NOW</td>
                    </tr>
                    <tr>
                        <td>Colaborador:</td>
                        <td>NOMBRE_COLABORADOR</td>
                    </tr>
                    <tr>
                        <td>Descuento aplicado:</td>
                        <td>TIPO_DESCUENTO</td>
                    </tr>
                    <tr>
                        <td>Método de pago:</td>
                        <td>METODO_PAGO</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- DetalleFactura -->
    <div class="container-Detail">
        <table class="style-FacturaDetail">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>NOMBRE_PRODUCTO</td>
                    <td>CANTIDAD</td>
                    <td>TOTAL_X_CANTIDAD</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Tabla de costos -->
    <div class="container-Costos">
        <table class="style-FacturaCosts">
            <tbody>
                <tr>
                    <td>Subtotal</td>
                    <td>SUBTOTAL</td>
                </tr>
                <tr>
                    <td>IVA</td>
                    <td>IVA</td>
                </tr>
                <tr>
                    <td>Total</td>
                    <td>TOTAL</td>
                </tr>
            </tbody>
        </table>
    </div>


</div>
